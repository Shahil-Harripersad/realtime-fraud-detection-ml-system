<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Fraud Detection Console</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Real-Time Fraud Detection Console</h1>
        <p class="subtitle">Live transaction monitoring via FastAPI + WebSockets</p>
      </div>
      <div class="status-group">
        <span id="socketStatus" class="status-pill offline">Disconnected</span>
      </div>
    </header>

    <section class="metrics-grid">
      <div class="metric-card">
        <span class="metric-label">Total Transactions</span>
        <span id="totalTx" class="metric-value">0</span>
      </div>

      <div class="metric-card">
        <span class="metric-label">Total Fraud</span>
        <span id="fraudTx" class="metric-value danger">0</span>
      </div>

      <div class="metric-card">
        <span class="metric-label">Total Amount</span>
        <span id="totalAmount" class="metric-value">$0.00</span>
      </div>

      <div class="metric-card">
        <span class="metric-label">Fraud Amount</span>
        <span id="fraudAmount" class="metric-value danger">$0.00</span>
      </div>

      <div class="metric-card">
        <span class="metric-label">Fraud Rate</span>
        <span id="fraudRate" class="metric-value">0.00%</span>
      </div>
    </section>

    <main class="content-grid">
      <section class="panel">
        <div class="panel-header">
          <h2>Live Transaction Tape</h2>
        </div>
        <div id="alertsList" class="alerts-list">
          <div class="empty-state">Waiting for transactions...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Fraud Probability Stream</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="probChart"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/app.js"></script>
</body>
</html>
